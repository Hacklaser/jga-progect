<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CafeCash – Login</title>
    <style>
        :root {
            --bg: #f8fafc;
            --text: #1e293b;
            --primary: #1E3A8A;
            --primary-light: #3b5ca8;
            --accent: #FBBF24;
            --card: #fff;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.07);
            --radius: 1.2rem;
            --transition: 0.25s ease;
        }
        body.dark {
            --bg: #0f172a;
            --text: #f1f5f9;
            --primary: #3B82F6;
            --primary-light: #60a5fa;
            --accent: #F59E0B;
            --card: #1e293b;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            transition: background var(--transition), color var(--transition);
            padding: 1rem;
        }
        .container {
            background: var(--card);
            padding: 2.4rem 2rem 2.8rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 440px;
            position: relative;
            transition: background var(--transition), box-shadow var(--transition);
        }
        .toggle-dark {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--text);
            padding: 0.2rem 1rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .toggle-dark:hover { background: var(--primary); color: #fff; }
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            margin-bottom: 0.2rem;
        }
        .logo img {
            width: 48px;
            height: 48px;
            border-radius: 0.6rem;
            object-fit: cover;
        }
        .logo .fallback {
            font-size: 2.2rem;
            color: var(--primary);
            display: none;
        }
        .logo span {
            font-weight: 800;
            font-size: 1.8rem;
            color: var(--primary);
            letter-spacing: -0.5px;
        }
        .slogan {
            font-size: 0.9rem;
            color: var(--accent);
            margin-bottom: 1.8rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            text-align: center;
        }
        .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.8rem; }
        .tab {
            flex: 1;
            padding: 0.7rem;
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--text);
            font-weight: 600;
            border-radius: 0.6rem;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.95rem;
        }
        .tab.active { background: var(--primary); color: #fff; }
        .tab:hover:not(.active) { background: var(--primary); color: #fff; opacity: 0.7; }
        .form { display: none; flex-direction: column; gap: 1rem; }
        .form.active { display: flex; }
        .form input, .form select {
            padding: 0.7rem 0.9rem;
            border: 1.5px solid #cbd5e1;
            border-radius: 0.6rem;
            background: var(--bg);
            color: var(--text);
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
            width: 100%;
        }
        .form input:focus, .form select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.15);
        }
        body.dark .form input, body.dark .form select { border-color: #475569; }
        .form .error {
            color: #ef4444;
            font-size: 0.85rem;
            display: none;
            background: #fee2e2;
            padding: 0.3rem 0.8rem;
            border-radius: 0.4rem;
        }
        body.dark .form .error { background: #450a0a; color: #fca5a5; }
        button.primary {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 0.8rem;
            border-radius: 0.6rem;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
            transition: var(--transition);
            width: 100%;
        }
        button.primary:hover { background: var(--primary-light); transform: translateY(-1px); }
        .plan-select {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
        }
        .plan-select label {
            flex: 1;
            min-width: 100px;
            padding: 0.6rem 0.8rem;
            border: 2px solid #cbd5e1;
            border-radius: 0.6rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            text-align: center;
            transition: var(--transition);
            background: var(--bg);
            color: var(--text);
        }
        .plan-select label:hover { border-color: var(--primary); }
        .plan-select input[type="radio"] { display: none; }
        .plan-select input[type="radio"]:checked + label {
            border-color: var(--primary);
            background: var(--primary);
            color: #fff;
        }
        .plan-select .price-tag { display: block; font-size: 0.7rem; opacity: 0.7; font-weight: 400; }
        .payment-row { display: flex; gap: 0.5rem; }
        .payment-row label { flex: 1; }
        .payment-row label:last-child { flex: 0.6; }
        .policy-note {
            font-size: 0.75rem;
            color: var(--text);
            opacity: 0.6;
            text-align: center;
            margin-top: 0.2rem;
            line-height: 1.4;
        }
        .policy-note a { color: var(--primary); text-decoration: underline; cursor: pointer; }
        @media (max-width: 480px) {
            .container { padding: 1.6rem 1.2rem; }
            .logo span { font-size: 1.4rem; }
            .plan-select label { min-width: 80px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <button class="toggle-dark" onclick="document.body.classList.toggle('dark')">🌓</button>
    <div class="logo">
        <img src="Screenshot_20260623_231104.jpg" alt="CafeCash" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" />
        <span class="fallback">☕</span>
        <span>CafeCash</span>
    </div>
    <div class="slogan">✨ Accounting made simple for Kafeterias.</div>
    <div class="tabs">
        <button class="tab active" id="loginTab">Login</button>
        <button class="tab" id="createTab">Create Account</button>
    </div>

    <!-- Login Form -->
    <div class="form active" id="loginForm">
        <input type="text" id="loginUser" placeholder="Username" />
        <input type="password" id="loginPass" placeholder="Password" />
        <div class="error" id="loginErr">❌ Invalid credentials</div>
        <button class="primary" id="loginBtn">Log In</button>
        <div class="policy-note">Don't have an account? <a id="switchToCreate">Create one</a></div>
    </div>

    <!-- Create Account Form -->
    <div class="form" id="createForm">
        <input type="text" id="createUser" placeholder="Choose username" />
        <input type="password" id="createPass" placeholder="Choose password" />
        <input type="password" id="createPassConfirm" placeholder="Confirm password" />
        <div class="error" id="createErr">⚠️ Username already exists or passwords don't match</div>

        <label style="font-weight:600; font-size:0.9rem; margin-top:0.2rem;">Choose your plan</label>
        <div class="plan-select" id="planSelect">
            <input type="radio" name="plan" id="planMonthly" value="monthly" checked />
            <label for="planMonthly">Monthly <span class="price-tag">R159.99 / mo</span></label>
            <input type="radio" name="plan" id="planYearly" value="yearly" />
            <label for="planYearly">Yearly <span class="price-tag">R1,599.99 / yr</span></label>
        </div>

        <label>Card number
            <input type="text" id="cardNum" placeholder="4242 4242 4242 4242" maxlength="19" />
        </label>
        <div class="payment-row">
            <label>Expiry <input type="text" id="cardExp" placeholder="MM/YY" maxlength="5" /></label>
            <label>CVV <input type="text" id="cardCvv" placeholder="123" maxlength="4" /></label>
        </div>

        <button class="primary" id="createBtn">Create Account &amp; Subscribe</button>
        <div class="policy-note">
            By creating an account you agree to our
            <a href="subscription.html" target="_blank">Subscription Policy</a>.
            Cancel anytime.
        </div>
    </div>
</div>
<script>
    const USERS_KEY = 'lg_users';
    const getUsers = () => JSON.parse(localStorage.getItem(USERS_KEY) || '{}');
    const saveUsers = (u) => localStorage.setItem(USERS_KEY, JSON.stringify(u));

    const loginTab = document.getElementById('loginTab');
    const createTab = document.getElementById('createTab');
    const loginForm = document.getElementById('loginForm');
    const createForm = document.getElementById('createForm');

    loginTab.onclick = () => {
        loginTab.classList.add('active');
        createTab.classList.remove('active');
        loginForm.classList.add('active');
        createForm.classList.remove('active');
    };
    createTab.onclick = () => {
        createTab.classList.add('active');
        loginTab.classList.remove('active');
        createForm.classList.add('active');
        loginForm.classList.remove('active');
    };
    document.getElementById('switchToCreate').onclick = (e) => { e.preventDefault(); createTab.click(); };

    document.getElementById('loginBtn').onclick = () => {
        const u = document.getElementById('loginUser').value.trim();
        const p = document.getElementById('loginPass').value;
        const all = getUsers();
        if (all[u] && all[u].password === p) {
            sessionStorage.setItem('lg_user', u);
            const branch = localStorage.getItem(`lg_${u}_branch`) || 'store1';
            localStorage.setItem('lg_branch', branch);
            location.href = 'dashboard.html';
        } else {
            document.getElementById('loginErr').style.display = 'block';
        }
    };

    document.getElementById('createBtn').onclick = () => {
        const u = document.getElementById('createUser').value.trim();
        const p = document.getElementById('createPass').value;
        const p2 = document.getElementById('createPassConfirm').value;
        const plan = document.querySelector('input[name="plan"]:checked')?.value || 'monthly';
        const card = document.getElementById('cardNum').value.trim();
        const exp = document.getElementById('cardExp').value.trim();
        const cvv = document.getElementById('cardCvv').value.trim();
        const errEl = document.getElementById('createErr');

        if (!u || !p || !p2) { errEl.textContent = '⚠️ Please fill in all fields.'; errEl.style.display = 'block'; return; }
        if (p !== p2) { errEl.textContent = '⚠️ Passwords do not match.'; errEl.style.display = 'block'; return; }
        if (p.length < 4) { errEl.textContent = '⚠️ Password must be at least 4 characters.'; errEl.style.display = 'block'; return; }
        if (!card || !exp || !cvv) { errEl.textContent = '⚠️ Please enter payment details.'; errEl.style.display = 'block'; return; }

        const all = getUsers();
        if (all[u]) { errEl.textContent = '⚠️ Username already exists.'; errEl.style.display = 'block'; return; }

        all[u] = {
            password: p,
            plan: plan,
            subscribed: true,
            subscriptionStart: new Date().toISOString(),
            payment: { card: card.slice(-4), exp, cvv: '•••' }
        };
        saveUsers(all);
        localStorage.setItem(`lg_${u}_branch`, 'store1');
        localStorage.setItem('lg_branch', 'store1');
        sessionStorage.setItem('lg_user', u);
        location.href = 'dashboard.html';
    };

    document.getElementById('cardNum').addEventListener('input', function() {
        let v = this.value.replace(/\D/g, '');
        v = v.replace(/(.{4})/g, '$1 ').trim();
        this.value = v;
    });
    document.getElementById('cardExp').addEventListener('input', function() {
        let v = this.value.replace(/\D/g, '');
        if (v.length > 2) v = v.slice(0, 2) + '/' + v.slice(2);
        this.value = v;
    });
    document.getElementById('cardCvv').addEventListener('input', function() {
        this.value = this.value.replace(/\D/g, '');
    });

    document.querySelectorAll('#createForm input').forEach(inp => {
        inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('createBtn').click(); });
    });
    document.querySelectorAll('#loginForm input').forEach(inp => {
        inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('loginBtn').click(); });
    });

    if (localStorage.getItem('lg_dark') === 'true') document.body.classList.add('dark');
    document.querySelector('.toggle-dark').addEventListener('click', () => {
        const isDark = document.body.classList.toggle('dark');
        localStorage.setItem('lg_dark', isDark);
    });
</script>
</body>
</html>
